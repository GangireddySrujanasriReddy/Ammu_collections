<!DOCTYPE html>
<html>
<head>
<title>Ammu Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f3f3f3; }

/* NAVBAR */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#131921;
  color:white;
  padding:10px 20px;
}
.logo img {
  height:45px;
  border-radius:50%;
  cursor:pointer;
}

#searchInput {
  width:40%;
  padding:10px;
  border-radius:6px;
  border:none;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:white;
  padding:10px;
  border-radius:8px;
  transition:0.3s;
}
.card:hover {
  transform:scale(1.03);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.card img {
  width:100%;
  height:150px;
  object-fit:contain;
}

.price { color:#B12704; font-weight:bold; }
.rating { color:orange; font-size:14px; }

button {
  background:#ffd814;
  border:none;
  padding:8px;
  margin-top:5px;
  cursor:pointer;
  border-radius:4px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

/* LOGIN CARD */
.login-box {
  background:white;
  padding:25px;
  border-radius:10px;
  width:350px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
  position:relative;
}

.login-box h2 {
  margin-bottom:15px;
}

.login-box input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

.login-btn {
  width:100%;
  background:#ff9900;
  color:white;
  padding:10px;
  border-radius:6px;
}

.close {
  position:absolute;
  top:10px;
  right:15px;
  font-size:20px;
  cursor:pointer;
}

/* CART */
.cart-box {
  background:white;
  padding:20px;
  border-radius:10px;
  width:400px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="header">
  <div class="logo">
    <img src="logo.png" onclick="showProducts(products)">
  </div>

  <input id="searchInput" placeholder="Search..." onkeyup="searchProducts()">

  <div>
    <button onclick="openLogin()">Login</button>
    <button onclick="openCart()">🛒 <span id="cartCount">0</span></button>
  </div>
</div>

<!-- PRODUCTS -->
<div class="products" id="productList"></div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
  <div class="login-box">
    <span class="close" onclick="closeAll()">❌</span>
    <h2>Sign in</h2>
    <input id="luser" placeholder="Email or Username">
    <input id="lpass" type="password" placeholder="Password">
    <button class="login-btn" onclick="login()">Sign in</button>
  </div>
</div>

<!-- CART MODAL -->
<div class="modal" id="cartModal">
  <div class="cart-box">
    <span class="close" onclick="closeAll()">❌</span>
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <p>Total ₹<span id="total">0</span></p>
  </div>
</div>

<script>

// PRODUCTS
let products = [
{name:"Lipstick",price:599,img:"lipstick.png"},
{name:"Kajal",price:299,img:"kajal.png"},
{name:"Foundation",price:799,img:"foundation.png"},
{name:"Compact",price:399,img:"compact.png"},
{name:"Eyeshadow",price:465,img:"eyeshadow.png"},
{name:"Eyeliner",price:299,img:"eyeliner.png"},
{name:"Concealer",price:349,img:"concealer.png"},
{name:"Face Cream",price:499,img:"facecream.png"},
{name:"Face Wash",price:326,img:"facewash.png"},
{name:"Moisturizer",price:599,img:"moisturizer.png"}
];

// DISPLAY
function showProducts(data){
  productList.innerHTML="";
  data.forEach(p=>{
    productList.innerHTML+=`
    <div class="card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <div class="rating">⭐⭐⭐⭐☆</div>
      <p class="price">₹${p.price}</p>
      <button onclick="addToCart('${p.name}',${p.price})">Add</button>
    </div>`;
  });
}
showProducts(products);

// SEARCH
function searchProducts(){
  let v=searchInput.value.toLowerCase();
  showProducts(products.filter(p=>p.name.toLowerCase().includes(v)));
}

// LOGIN
let loggedIn=false;
function login(){
  if(!luser.value || !lpass.value){
    alert("Enter details");
    return;
  }
  loggedIn=true;
  alert("Login successful");
  closeAll();
}

// CART
let cart=[];
function addToCart(name,price){
  if(!loggedIn){
    alert("Please login first");
    return;
  }
  cart.push({name,price});
  cartCount.innerText=cart.length;
}

// CART VIEW
function openCart(){
  cartModal.style.display="flex";
  let total=0;
  cartItems.innerHTML="";
  cart.forEach(c=>{
    total+=c.price;
    cartItems.innerHTML+=`<p>${c.name} ₹${c.price}</p>`;
  });
  document.getElementById("total").innerText=total;
}

// MODALS
function openLogin(){ loginModal.style.display="flex"; }
function closeAll(){
  document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
}

</script>

</body>
</html>
