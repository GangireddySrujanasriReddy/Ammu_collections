<!DOCTYPE html>
<html>
<head>
<title>Ammu Collections Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f3f3f3}

/* NAVBAR */
.header{
display:flex;justify-content:space-between;align-items:center;
background:#131921;color:white;padding:10px 20px
}
.logo img{height:50px;border-radius:50%;cursor:pointer}

/* SEARCH */
#searchInput{width:40%;padding:8px}

/* PRODUCTS */
.products{
display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;padding:20px
}
.card{
background:white;padding:15px;border-radius:10px;text-align:center
}
.card img{height:120px}

/* MODAL */
.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);justify-content:center;align-items:center
}
.box{
background:white;padding:20px;border-radius:10px;width:90%;max-width:600px
}
.close{
position:absolute;top:20px;right:30px;color:white;font-size:25px;cursor:pointer
}

button{background:orange;border:none;padding:8px;margin:5px;cursor:pointer}
input{width:90%;padding:8px;margin:5px}
</style>
</head>

<body>

<div class="header">
<div class="logo">
<img src="logo.png" onclick="showProducts(products)">
</div>

<input id="searchInput" placeholder="Search..." onkeyup="searchProducts()">

<div>
<button onclick="openSignup()">Signup</button>
<button onclick="openLogin()">Login</button>
<button onclick="openOrders()">Orders</button>
<button onclick="openCart()">🛒 <span id="cartCount">0</span></button>
<button id="adminBtn" style="display:none" onclick="openAdmin()">Admin</button>
</div>
</div>

<div class="products" id="productList"></div>

<!-- MODALS -->
<div class="modal" id="loginModal">
<span class="close" onclick="closeAll()">❌</span>
<div class="box">
<h3>Login</h3>
<input id="luser" placeholder="Username">
<input id="lpass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div class="modal" id="signupModal">
<span class="close" onclick="closeAll()">❌</span>
<div class="box">
<h3>Signup</h3>
<input id="suser" placeholder="Username">
<input id="spass" type="password">
<button onclick="signup()">Signup</button>
</div>
</div>

<div class="modal" id="cartModal">
<span class="close" onclick="closeAll()">❌</span>
<div class="box">
<h3>Cart</h3>
<div id="cartItems"></div>
<p>Total: ₹<span id="total">0</span></p>
<button onclick="checkout()">Checkout</button>
</div>
</div>

<div class="modal" id="ordersModal">
<span class="close" onclick="closeAll()">❌</span>
<div class="box">
<h3>Order History</h3>
<div id="orders"></div>
</div>
</div>

<div class="modal" id="adminModal">
<span class="close" onclick="closeAll()">❌</span>
<div class="box">
<h3>Add Product</h3>
<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image name">
<button onclick="addProduct()">Add</button>
</div>
</div>

<script>

// STORAGE
let users=JSON.parse(localStorage.getItem("users"))||{};
let currentUser=localStorage.getItem("currentUser");

// PRODUCTS
let products=JSON.parse(localStorage.getItem("products"))||[
{name:"Lipstick",price:599,img:"lipstick.png"},
{name:"Face Wash",price:326,img:"facewash.png"}
];

// SHOW PRODUCTS
function showProducts(data){
productList.innerHTML=""
data.forEach(p=>{
productList.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>`
})
}
showProducts(products)

// SEARCH
function searchProducts(){
let v=searchInput.value.toLowerCase()
showProducts(products.filter(p=>p.name.toLowerCase().includes(v)))
}

// AUTH
function signup(){
if(users[suser.value])return alert("User exists")
users[suser.value]={pass:spass.value,cart:[],orders:[]}
save()
alert("Signup success")
closeAll()
}

function login(){
if(luser.value==="admin" && lpass.value==="admin123"){
currentUser="admin"
adminBtn.style.display="inline"
alert("Admin login")
closeAll()
return
}

if(users[luser.value] && users[luser.value].pass===lpass.value){
currentUser=luser.value
localStorage.setItem("currentUser",currentUser)
alert("Login success")
closeAll()
}else alert("Invalid")
}

// CART
function addToCart(name,price){
if(!currentUser)return alert("Login first")
users[currentUser].cart.push({name,price})
save()
updateCart()
}

function updateCart(){
if(!currentUser)return
cartCount.innerText=users[currentUser].cart.length
}

// CART VIEW
function openCart(){
cartModal.style.display="flex"
let cart=users[currentUser].cart
cartItems.innerHTML=""
let total=0
cart.forEach(c=>{
total+=c.price
cartItems.innerHTML+=`<p>${c.name} ₹${c.price}</p>`
})
document.getElementById("total").innerText=total
}

// CHECKOUT
function checkout(){
let cart=users[currentUser].cart
if(cart.length===0)return alert("Empty cart")

users[currentUser].orders.push([...cart])
users[currentUser].cart=[]
save()
updateCart()
alert("Payment successful!")
closeAll()
}

// ORDERS
function openOrders(){
ordersModal.style.display="flex"
let list=users[currentUser].orders
orders.innerHTML=""
list.forEach(o=>{
orders.innerHTML+=`<p>Order: ${o.map(i=>i.name).join(", ")}</p>`
})
}

// ADMIN
function openAdmin(){adminModal.style.display="flex"}

function addProduct(){
products.push({name:pname.value,price:pprice.value,img:pimg.value})
localStorage.setItem("products",JSON.stringify(products))
showProducts(products)
alert("Product added")
closeAll()
}

// MODALS
function openLogin(){loginModal.style.display="flex"}
function openSignup(){signupModal.style.display="flex"}
function closeAll(){document.querySelectorAll(".modal").forEach(m=>m.style.display="none")}

// SAVE
function save(){
localStorage.setItem("users",JSON.stringify(users))
}

updateCart()

</script>

</body>
</html>
