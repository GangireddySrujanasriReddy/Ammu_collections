<!DOCTYPE html>
<html>
<head>
<title>Ammu Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#f3f3f3;
transition:.3s;
}

.dark{background:#121212;color:white}

/* NAVBAR */
.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#131921;
color:white;
padding:10px 20px;
}

.logo img{
height:55px;
border-radius:50%;
cursor:pointer;
}

#searchInput{
width:40%;
padding:10px;
border-radius:6px;
border:none;
}

/* MAIN LAYOUT FIX */
.container{
display:flex;
}

/* SIDEBAR FIXED */
.sidebar{
width:180px;
padding:15px;
background:#fff;
min-height:100vh;
box-shadow:2px 0 10px rgba(0,0,0,.2);
}

.dark .sidebar{background:#1e1e1e}

/* PRODUCTS AREA */
.products{
flex:1;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
padding:20px;
}

/* CARD */
.card{
background:white;
padding:10px;
border-radius:10px;
cursor:pointer;
position:relative;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 5px 20px rgba(0,0,0,.3);
}

.dark .card{background:#1e1e1e}

.card img{
width:100%;
height:140px;
object-fit:contain;
}

.price{color:red}

/* RATING */
.stars{color:gold}

/* WISHLIST */
.wishlist{
position:absolute;
top:8px;
right:8px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:15px;
border-radius:10px;
width:300px;
text-align:center;
position:relative;
}

.close{
position:absolute;
top:10px;
right:10px;
cursor:pointer;
}

/* LOGO */
.logo-wrapper{
position:relative;
display:flex;
justify-content:center;
}

.logo-circle{
width:280px;height:280px;
border-radius:50%;
overflow:hidden;
background:white;
}

.logo-close{
position:absolute;
top:-10px;
right:-10px;
background:white;
padding:5px;
border-radius:50%;
cursor:pointer;
}

button{
background:orange;
border:none;
padding:6px;
cursor:pointer;
margin-top:5px;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">
<img src="logo.png" onclick="openLogo()">
</div>

<input id="searchInput" placeholder="Search..." onkeyup="searchProducts()">

<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="openSignup()">Signup</button>
<button onclick="openLogin()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="openCart()">🛒 <span id="cartCount">0</span></button>
</div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>Filters</h3>
<button onclick="filterPrice(500)">Under ₹500</button>
<button onclick="filterPrice(1000)">Under ₹1000</button>
<button onclick="showProducts(products)">All</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="productList"></div>

</div>

<!-- LOGO -->
<div class="modal" id="logoModal">
<div class="logo-wrapper">
<div class="logo-circle">
<img src="logo.png" style="width:100%">
</div>
<span class="logo-close" onclick="closeAll()">❌</span>
</div>
</div>

<script>

// FULL PRODUCTS LIST ✅
let products=[
{name:"Lipstick",price:599,img:"lipstick.png",rating:4},
{name:"Kajal",price:299,img:"kajal.png",rating:5},
{name:"Foundation",price:799,img:"foundation.png",rating:3},
{name:"Compact",price:399,img:"compact.png",rating:4},
{name:"Eyeshadow",price:465,img:"eyeshadow.png",rating:4},
{name:"Eyeliner",price:299,img:"eyeliner.png",rating:5},
{name:"Concealer",price:349,img:"concealer.png",rating:3},
{name:"Nail Polish",price:199,img:"nailpolish.png",rating:4},
{name:"Face Cream",price:499,img:"facecream.png",rating:5},
{name:"Face Wash",price:326,img:"facewash.png",rating:5},
{name:"Face Serum",price:465,img:"faceserum.png",rating:4},
{name:"Moisturizer",price:599,img:"moisturizer.png",rating:4},
{name:"Body Wash",price:699,img:"bodywash.png",rating:3},
{name:"Aloe Vera",price:299,img:"aloevera.png",rating:5},
{name:"Hair Serum",price:549,img:"hairserum.png",rating:4},
{name:"Shampoo",price:399,img:"shampoo.png",rating:4},
{name:"Conditioner",price:449,img:"conditioner.png",rating:3},
{name:"Hair Spray",price:599,img:"hairspray.png",rating:4}
];

// DISPLAY
function showProducts(data){
productList.innerHTML="";
data.forEach(p=>{
productList.innerHTML+=`
<div class="card">

<div class="wishlist" onclick="event.stopPropagation();alert('${p.name} added ❤️')">❤️</div>

<img src="${p.img}">
<h4>${p.name}</h4>

<div class="stars">${"⭐".repeat(p.rating)}</div>

<p class="price">₹${p.price}</p>

</div>`;
});
}
showProducts(products);

// SEARCH
function searchProducts(){
let v=searchInput.value.toLowerCase().trim();
showProducts(products.filter(p=>p.name.toLowerCase().includes(v)));
}

// FILTER
function filterPrice(price){
showProducts(products.filter(p=>p.price<=price));
}

// DARK MODE
function toggleDark(){
document.body.classList.toggle("dark");
}

// LOGO
function openLogo(){
logoModal.style.display="flex";
}

// CLOSE
function closeAll(){
document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
}

</script>

</body>
</html>
