<!DOCTYPE html>
<html>
<head>
<title>Ammu Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f3f3f3}

/* NAVBAR */
.header{
display:flex;justify-content:space-between;align-items:center;
background:#131921;color:white;padding:10px 20px
}
.logo img{
height:50px;border-radius:50%;cursor:pointer
}

#searchInput{
width:40%;padding:10px;border-radius:6px;border:none
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;padding:20px
}

/* CARD */
.card{
background:white;padding:10px;border-radius:8px;
transition:.3s
}
.card:hover{transform:scale(1.03);box-shadow:0 5px 15px rgba(0,0,0,.2)}
.card img{width:100%;height:140px;object-fit:contain}

.price{color:#B12704;font-weight:bold}
.rating{color:orange;font-size:14px}
.badge{background:red;color:white;font-size:11px;padding:2px 5px}

/* MODAL */
.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);
justify-content:center;align-items:center
}

.box{
background:white;padding:20px;border-radius:10px;
width:90%;max-width:500px;position:relative;text-align:center
}

.close{
position:absolute;top:10px;right:15px;font-size:18px;cursor:pointer
}

/* LOGO */
.big-logo{
width:220px;height:220px;border-radius:50%;
object-fit:cover
}

input{
width:95%;padding:10px;margin:8px 0;
border-radius:6px;border:1px solid #ccc
}

button{
background:#ffd814;border:none;padding:8px;margin-top:5px;cursor:pointer
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="header">
<div class="logo">
<img src="logo.png" onclick="openLogo()">
</div>

<input id="searchInput" placeholder="Search..." onkeyup="searchProducts()">

<div>
<button onclick="openSignup()">Signup</button>
<button onclick="openLogin()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="openOrders()">Orders</button>
<button onclick="openCart()">🛒 <span id="cartCount">0</span></button>
</div>
</div>

<!-- PRODUCTS -->
<div class="products" id="productList"></div>

<!-- LOGO POPUP -->
<div class="modal" id="logoModal">
<div class="box">
<span class="close" onclick="closeAll()">❌</span>
<img src="logo.png" class="big-logo">
</div>
</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="box">
<span class="close" onclick="closeAll()">❌</span>
<h3>Login</h3>
<input id="luser" placeholder="Username">
<input id="lpass" type="password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- SIGNUP -->
<div class="modal" id="signupModal">
<div class="box">
<span class="close" onclick="closeAll()">❌</span>
<h3>Signup</h3>
<input id="suser" placeholder="Username">
<input id="spass" type="password">
<button onclick="signup()">Signup</button>
</div>
</div>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="box">
<span class="close" onclick="closeAll()">❌</span>
<h3>Cart</h3>
<div id="cartItems"></div>
<p>Total ₹<span id="total">0</span></p>
<button onclick="checkout()">Checkout</button>
</div>
</div>

<!-- ORDERS -->
<div class="modal" id="ordersModal">
<div class="box">
<span class="close" onclick="closeAll()">❌</span>
<h3>Orders</h3>
<div id="orders"></div>
</div>
</div>

<script>

// STORAGE
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = localStorage.getItem("currentUser");

// FULL PRODUCTS
let products = [
{name:"Lipstick",price:599,img:"lipstick.png"},
{name:"Kajal",price:299,img:"kajal.png"},
{name:"Foundation",price:799,img:"foundation.png"},
{name:"Compact",price:399,img:"compact.png"},
{name:"Eyeshadow",price:465,img:"eyeshadow.png"},
{name:"Eyeliner",price:299,img:"eyeliner.png"},
{name:"Concealer",price:349,img:"concealer.png"},
{name:"Nail Polish",price:199,img:"nailpolish.png"},
{name:"Face Cream",price:499,img:"facecream.png"},
{name:"Face Wash",price:326,img:"facewash.png"},
{name:"Face Serum",price:465,img:"faceserum.png"},
{name:"Moisturizer",price:599,img:"moisturizer.png"},
{name:"Body Wash",price:699,img:"bodywash.png"},
{name:"Aloe Vera Gel",price:299,img:"aloevera.png"},
{name:"Hair Serum",price:549,img:"hairserum.png"},
{name:"Shampoo",price:399,img:"shampoo.png"},
{name:"Conditioner",price:449,img:"conditioner.png"},
{name:"Hair Spray",price:599,img:"hairspray.png"}
];

// DISPLAY
function showProducts(data){
productList.innerHTML="";
data.forEach(p=>{
productList.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="rating">⭐⭐⭐⭐☆</div>
<p class="price">₹${p.price}</p>
<span class="badge">Deal</span><br>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>`;
});
}
showProducts(products);

// SEARCH
function searchProducts(){
let v=searchInput.value.toLowerCase();
showProducts(products.filter(p=>p.name.toLowerCase().includes(v)));
}

// LOGO
function openLogo(){
logoModal.style.display="flex";
}

// AUTH
function signup(){
if(!suser.value||!spass.value)return alert("Fill all fields");
if(users[suser.value])return alert("User exists");
users[suser.value]={pass:spass.value,cart:[],orders:[]};
save();alert("Signup success");closeAll();
}

function login(){
if(users[luser.value] && users[luser.value].pass===lpass.value){
currentUser=luser.value;
localStorage.setItem("currentUser",currentUser);
alert("Login success");closeAll();
}else alert("Invalid credentials");
}

function logout(){
currentUser=null;
localStorage.removeItem("currentUser");
alert("Logged out");
}

// CART
function addToCart(name,price){
if(!currentUser) return alert("Login required");
users[currentUser].cart.push({name,price,qty:1});
save();updateCart();
}

function updateCart(){
if(!currentUser) return;
cartCount.innerText=users[currentUser].cart.length;
}

function openCart(){
if(!currentUser) return alert("Login required");

cartModal.style.display="flex";
let cart=users[currentUser].cart;
cartItems.innerHTML="";
let total=0;

cart.forEach((c,i)=>{
total+=c.price*c.qty;
cartItems.innerHTML+=`
<p>${c.name} ₹${c.price}
<button onclick="inc(${i})">+</button>
${c.qty}
<button onclick="dec(${i})">-</button>
<button onclick="removeItem(${i})">x</button>
</p>`;
});
document.getElementById("total").innerText=total;
}

function inc(i){users[currentUser].cart[i].qty++;save();openCart();}
function dec(i){if(users[currentUser].cart[i].qty>1)users[currentUser].cart[i].qty--;save();openCart();}
function removeItem(i){users[currentUser].cart.splice(i,1);save();openCart();}

// CHECKOUT
function checkout(){
users[currentUser].orders.push([...users[currentUser].cart]);
users[currentUser].cart=[];
save();updateCart();
alert("Payment successful");closeAll();
}

// ORDERS
function openOrders(){
if(!currentUser) return alert("Login required");

ordersModal.style.display="flex";
orders.innerHTML="";
users[currentUser].orders.forEach(o=>{
orders.innerHTML+=`<p>${o.map(i=>i.name).join(", ")}</p>`;
});
}

// SAVE
function save(){
localStorage.setItem("users",JSON.stringify(users));
}

// MODALS
function openLogin(){loginModal.style.display="flex";}
function openSignup(){signupModal.style.display="flex";}
function closeAll(){
document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
}

updateCart();

</script>

</body>
</html>
