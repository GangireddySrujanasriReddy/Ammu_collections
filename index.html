<!DOCTYPE html>
<html>
<head>
<title>Ammu Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f3f3f3; }

/* NAVBAR */
.header {
  display:flex; justify-content:space-between; align-items:center;
  background:#131921; color:white; padding:10px 20px;
}
.logo img { height:50px; border-radius:50%; cursor:pointer; }

#searchInput { width:40%; padding:8px; }

/* PRODUCTS GRID */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

/* CARD */
.card {
  background:white;
  padding:10px;
  border-radius:8px;
  transition:0.3s;
}
.card:hover {
  transform:scale(1.03);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.card img {
  width:100%;
  height:150px;
  object-fit:contain;
}

.price { color:#B12704; font-weight:bold; }
.rating { color:orange; font-size:14px; }
.badge {
  background:red; color:white;
  padding:2px 6px; font-size:12px;
}

/* MODALS */
.modal {
  display:none; position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center; align-items:center;
}
.box {
  background:white; padding:20px;
  border-radius:10px; width:90%; max-width:900px;
}
.close {
  position:absolute; top:20px; right:30px;
  font-size:25px; color:white; cursor:pointer;
}

button {
  background:orange; border:none;
  padding:6px; cursor:pointer; margin-top:5px;
}
input { padding:8px; margin:5px; width:90%; }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="header">
  <div class="logo">
    <img src="logo.png" onclick="openProductPopup()">
  </div>

  <input id="searchInput" placeholder="Search..." onkeyup="searchProducts()">

  <div>
    <button onclick="openSignup()">Signup</button>
    <button onclick="openLogin()">Login</button>
    <button onclick="openOrders()">Orders</button>
    <button onclick="openCart()">🛒 <span id="cartCount">0</span></button>
  </div>
</div>

<!-- PRODUCTS -->
<div class="products" id="productList"></div>

<!-- POPUP -->
<div class="modal" id="productModal">
<span class="close" onclick="closeAll()">❌</span>
<div class="box">
<h3>All Products</h3>
<div class="products" id="popupProducts"></div>
</div>
</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<span class="close" onclick="closeAll()">❌</span>
<div class="box">
<h3>Login</h3>
<input id="luser">
<input id="lpass" type="password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- SIGNUP -->
<div class="modal" id="signupModal">
<span class="close" onclick="closeAll()">❌</span>
<div class="box">
<h3>Signup</h3>
<input id="suser">
<input id="spass" type="password">
<button onclick="signup()">Signup</button>
</div>
</div>

<!-- CART -->
<div class="modal" id="cartModal">
<span class="close" onclick="closeAll()">❌</span>
<div class="box">
<h3>Cart</h3>
<div id="cartItems"></div>
<p>Total ₹<span id="total">0</span></p>
<button onclick="checkout()">Checkout</button>
</div>
</div>

<!-- ORDERS -->
<div class="modal" id="ordersModal">
<span class="close" onclick="closeAll()">❌</span>
<div class="box">
<h3>Orders</h3>
<div id="orders"></div>
</div>
</div>

<script>

// STORAGE
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = localStorage.getItem("currentUser");

// PRODUCTS
let products = [
{name:"Lipstick",price:599,img:"lipstick.png"},
{name:"Kajal",price:299,img:"kajal.png"},
{name:"Foundation",price:799,img:"foundation.png"},
{name:"Compact",price:399,img:"compact.png"},
{name:"Eyeshadow",price:465,img:"eyeshadow.png"},
{name:"Eyeliner",price:299,img:"eyeliner.png"},
{name:"Concealer",price:349,img:"concealer.png"},
{name:"Nail Polish",price:199,img:"nailpolish.png"},
{name:"Face Cream",price:499,img:"facecream.png"},
{name:"Face Wash",price:326,img:"facewash.png"},
{name:"Face Serum",price:465,img:"faceserum.png"},
{name:"Moisturizer",price:599,img:"moisturizer.png"},
{name:"Body Wash",price:699,img:"bodywash.png"},
{name:"Aloe Vera",price:299,img:"aloevera.png"},
{name:"Hair Serum",price:549,img:"hairserum.png"},
{name:"Shampoo",price:399,img:"shampoo.png"},
{name:"Conditioner",price:449,img:"conditioner.png"},
{name:"Hair Spray",price:599,img:"hairspray.png"}
];

// DISPLAY
function showProducts(data){
productList.innerHTML="";
data.forEach(p=>productList.innerHTML+=card(p));
}
showProducts(products);

// CARD
function card(p){
return `
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="rating">⭐⭐⭐⭐☆</div>
<p class="price">₹${p.price}</p>
<span class="badge">Deal</span><br>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>`;
}

// SEARCH
function searchProducts(){
let v=searchInput.value.toLowerCase();
showProducts(products.filter(p=>p.name.toLowerCase().includes(v)));
}

// POPUP
function openProductPopup(){
productModal.style.display="flex";
popupProducts.innerHTML="";
products.forEach(p=>popupProducts.innerHTML+=card(p));
}

// AUTH
function signup(){
users[suser.value]={pass:spass.value,cart:[],orders:[]};
save(); alert("Signup success"); closeAll();
}

function login(){
if(users[luser.value] && users[luser.value].pass===lpass.value){
currentUser=luser.value;
localStorage.setItem("currentUser",currentUser);
alert("Login success");
closeAll();
}else alert("Invalid");
}

// CART
function addToCart(name,price){
if(!currentUser)return alert("Login first");
users[currentUser].cart.push({name,price});
save(); updateCart();
}

function updateCart(){
if(!currentUser)return;
cartCount.innerText=users[currentUser].cart.length;
}

function openCart(){
cartModal.style.display="flex";
let cart=users[currentUser].cart;
cartItems.innerHTML="";
let total=0;
cart.forEach(c=>{
total+=c.price;
cartItems.innerHTML+=`<p>${c.name} ₹${c.price}</p>`;
});
document.getElementById("total").innerText=total;
}

// CHECKOUT
function checkout(){
users[currentUser].orders.push([...users[currentUser].cart]);
users[currentUser].cart=[];
save(); updateCart();
alert("Payment successful");
closeAll();
}

// ORDERS
function openOrders(){
ordersModal.style.display="flex";
orders.innerHTML="";
users[currentUser].orders.forEach(o=>{
orders.innerHTML+=`<p>${o.map(i=>i.name).join(", ")}</p>`;
});
}

// SAVE
function save(){
localStorage.setItem("users",JSON.stringify(users));
}

// MODALS
function openLogin(){loginModal.style.display="flex";}
function openSignup(){signupModal.style.display="flex";}
function closeAll(){document.querySelectorAll(".modal").forEach(m=>m.style.display="none");}

updateCart();

</script>

</body>
</html>
