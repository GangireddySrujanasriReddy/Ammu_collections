<!DOCTYPE html>
<html>
<head>
<title>Ammu Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌞 LIGHT + 🌙 DARK MODE */
body{
  margin:0;
  font-family:Segoe UI;
  background:#f3f3f3;
  transition:0.3s;
}

.dark{
  background:#121212;
  color:white;
}

/* NAVBAR (UNCHANGED STRUCTURE) */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#131921;
  color:white;
  padding:10px 20px;
}

.logo img{
  height:55px;
  border-radius:50%;
  cursor:pointer;
}

#searchInput{
  width:40%;
  padding:10px;
  border-radius:6px;
  border:none;
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

/* CARD */
.card{
  background:white;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
  position:relative;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.dark .card{
  background:#1e1e1e;
}

.card img{
  width:100%;
  height:140px;
  object-fit:contain;
}

.price{color:red}

/* ⭐ RATING */
.stars{
  color:gold;
}

/* ❤️ WISHLIST */
.wishlist{
  position:absolute;
  top:8px;
  right:8px;
  cursor:pointer;
  font-size:18px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:60px;
  width:150px;
  background:#fff;
  height:100%;
  padding:10px;
  box-shadow:2px 0 10px rgba(0,0,0,0.2);
}

.dark .sidebar{
  background:#1e1e1e;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  width:300px;
  text-align:center;
  position:relative;
}

.close{
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
}

/* LOGO */
.logo-wrapper{position:relative;display:flex;justify-content:center}
.logo-circle{
  width:280px;height:280px;border-radius:50%;
  overflow:hidden;background:white;
}
.logo-close{
  position:absolute;
  top:-10px;right:-10px;
  background:white;
  border-radius:50%;
  padding:5px;
  cursor:pointer;
}

button{
  background:orange;
  border:none;
  padding:6px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">
<img src="logo.png" onclick="openLogo()">
</div>

<input id="searchInput" placeholder="Search..." onkeyup="searchProducts()">

<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="openSignup()">Signup</button>
<button onclick="openLogin()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="openOrders()">Orders</button>
<button onclick="openCart()">🛒 <span id="cartCount">0</span></button>
</div>
</div>

<!-- SIDEBAR FILTER -->
<div class="sidebar">
<h4>Filter</h4>
<button onclick="filterPrice(500)">Under 500</button>
<button onclick="filterPrice(1000)">Under 1000</button>
<button onclick="showProducts(products)">All</button>
</div>

<div class="products" id="productList"></div>

<!-- LOGO -->
<div class="modal" id="logoModal">
<div class="logo-wrapper">
<div class="logo-circle">
<img src="logo.png" style="width:100%">
</div>
<span class="logo-close" onclick="closeAll()">❌</span>
</div>
</div>

<script>

// DATA
let products=[
{name:"Lipstick",price:599,img:"lipstick.png",rating:4},
{name:"Kajal",price:299,img:"kajal.png",rating:5},
{name:"Foundation",price:799,img:"foundation.png",rating:3},
{name:"Compact",price:399,img:"compact.png",rating:4},
{name:"Face Wash",price:326,img:"facewash.png",rating:5}
];

let users={},currentUser=null;

// DISPLAY
function showProducts(data){
productList.innerHTML="";
data.forEach(p=>{
productList.innerHTML+=`
<div class="card" onclick="openProduct('${p.name}',${p.price},'${p.img}')">

<div class="wishlist" onclick="event.stopPropagation();addWishlist('${p.name}')">❤️</div>

<img src="${p.img}">
<h4>${p.name}</h4>

<div class="stars">${"⭐".repeat(p.rating)}</div>

<p class="price">₹${p.price}</p>

</div>`;
});
}
showProducts(products);

/* SEARCH */
function searchProducts(){
let v=searchInput.value.toLowerCase();
showProducts(products.filter(p=>p.name.toLowerCase().includes(v)));
}

/* FILTER */
function filterPrice(price){
showProducts(products.filter(p=>p.price<=price));
}

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* WISHLIST */
function addWishlist(name){
alert(name+" added to wishlist ❤️");
}

/* LOGO */
function openLogo(){logoModal.style.display="flex";}

/* MODAL CLOSE */
function closeAll(){
document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
}

</script>

</body>
</html>
