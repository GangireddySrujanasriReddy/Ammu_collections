<!DOCTYPE html>
<html>
<head>
  <title>Ammu Collections</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f3f3f3;
}

/* NAVBAR */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #131921;
  color: white;
  padding: 10px 20px;
}

.logo img {
  height: 50px;
  border-radius: 50%; /* 🔥 circle logo */
}

/* SEARCH */
#searchInput {
  width: 40%;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

/* HERO */
.hero {
  height: 200px;
  background: linear-gradient(to right, #131921, #232f3e);
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero img {
  height: 120px;
  border-radius: 50%;
}

/* CAROUSEL FIX */
.carousel {
  width: 100%;
  height: 300px;
  overflow: hidden;
  background: #000;
}

.carousel img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* 🔥 FIXED */
}

/* OFFERS IMPROVED */
.offers {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.offer-card {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.offer-card:hover {
  transform: translateY(-5px);
}

/* CATEGORY */
.categories {
  text-align: center;
  padding: 10px;
}

.categories button {
  background: orange;
  margin: 5px;
  padding: 10px 15px;
  border: none;
  cursor: pointer;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 20px gray;
}

.card img {
  height: 150px;
  object-fit: contain;
}

button {
  background: orange;
  border: none;
  padding: 8px;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="header">
  <div class="logo"><img src="logo.png"></div>
  <input id="searchInput" placeholder="Search..." onkeyup="searchProducts()">
  <div>
    <button onclick="login()">Login</button>
    🛒 <span id="cartCount">0</span>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="logo.png">
</div>

<!-- CAROUSEL -->
<div class="carousel">
  <img id="slider" src="aloevera.png">
</div>

<!-- OFFERS -->
<div class="offers">
  <div class="offer-card">🔥 50% OFF Makeup</div>
  <div class="offer-card">💄 Trending Beauty</div>
  <div class="offer-card">🌿 Natural Products</div>
</div>

<!-- CATEGORY -->
<div class="categories">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('makeup')">Makeup</button>
  <button onclick="filterCategory('skincare')">Skincare</button>
  <button onclick="filterCategory('hair')">Hair</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="productList"></div>

<script>

// FULL PRODUCTS
let products = [
  {name:"Lipstick",price:599,img:"lipstick.png",category:"makeup"},
  {name:"Kajal",price:299,img:"kajal.png",category:"makeup"},
  {name:"Foundation",price:799,img:"foundation.png",category:"makeup"},
  {name:"Compact",price:399,img:"compact.png",category:"makeup"},
  {name:"Eyeshadow",price:465,img:"eyeshadow.png",category:"makeup"},
  {name:"Eyeliner",price:299,img:"eyeliner.png",category:"makeup"},
  {name:"Concealer",price:349,img:"concealer.png",category:"makeup"},
  {name:"Nail Polish",price:199,img:"nailpolish.png",category:"makeup"},

  {name:"Face Cream",price:499,img:"facecream.png",category:"skincare"},
  {name:"Face Wash",price:326,img:"facewash.png",category:"skincare"},
  {name:"Face Serum",price:465,img:"faceserum.png",category:"skincare"},
  {name:"Moisturizer",price:599,img:"moisturizer.png",category:"skincare"},
  {name:"Body Wash",price:699,img:"bodywash.png",category:"skincare"},
  {name:"Aloe Vera Gel",price:299,img:"aloevera.png",category:"skincare"},

  {name:"Hair Serum",price:549,img:"hairserum.png",category:"hair"},
  {name:"Shampoo",price:399,img:"shampoo.png",category:"hair"},
  {name:"Conditioner",price:449,img:"conditioner.png",category:"hair"},
  {name:"Hair Spray",price:599,img:"hairspray.png",category:"hair"}
];

// DISPLAY
let list = document.getElementById("productList");

function showProducts(data){
  list.innerHTML="";
  data.forEach(p=>{
    list.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
      </div>
    `;
  });
}

showProducts(products);

// SEARCH
function searchProducts(){
  let v = searchInput.value.toLowerCase();
  let filtered = products.filter(p=>p.name.toLowerCase().includes(v));
  showProducts(filtered);
}

// CATEGORY
function filterCategory(cat){
  if(cat==="all"){
    showProducts(products);
  } else {
    let filtered = products.filter(p=>p.category===cat);
    showProducts(filtered);
  }
}

// CART
let cart=[];
let loggedIn=false;

function login(){
  loggedIn=true;
  alert("Logged in!");
}

function addToCart(name,price){
  if(!loggedIn){
    alert("Login first");
    return;
  }
  cart.push({name,price});
  document.getElementById("cartCount").innerText = cart.length;
}

// SLIDER FIXED
let images=["aloevera.png","facewash.png","lipstick.png"];
let i=0;

setInterval(()=>{
  document.getElementById("slider").src = images[i];
  i=(i+1)%images.length;
},3000);

</script>

</body>
</html>
