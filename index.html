<!DOCTYPE html>
<html>
<head>
<title>Ammu Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Segoe UI;background:#f3f3f3}

/* NAVBAR */
.header{
display:flex;justify-content:space-between;align-items:center;
background:#131921;color:white;padding:10px 20px
}
.logo img{height:55px;border-radius:50%;cursor:pointer}

#searchInput{
width:40%;padding:10px;border-radius:6px;border:none
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;padding:20px
}

/* CARD */
.card{
background:white;padding:10px;border-radius:10px;
cursor:pointer;position:relative;transition:.3s
}
.card:hover{
transform:scale(1.05);
box-shadow:0 5px 20px rgba(0,0,0,.3)
}

.card img{width:100%;height:140px;object-fit:contain}
.price{color:red}
.stars{color:gold}

/* WISHLIST */
.wishlist{
position:absolute;top:8px;right:8px;cursor:pointer
}

/* BUTTON */
button{
background:orange;border:none;padding:8px;cursor:pointer;margin-top:5px;border-radius:5px
}

/* MODAL */
.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);justify-content:center;align-items:center
}

.box{
background:white;padding:20px;border-radius:12px;width:320px;
text-align:center;position:relative
}

.box input{
width:90%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc
}

.close{
position:absolute;top:10px;right:15px;font-size:20px;cursor:pointer
}

/* LOGO */
.logo-wrapper{
position:relative;display:flex;justify-content:center;align-items:center
}

.logo-circle{
width:250px;height:250px;border-radius:50%;
overflow:hidden;background:white
}

.logo-close{
position:absolute;top:-10px;right:-10px;
background:white;border-radius:50%;padding:5px;cursor:pointer
}

.premium-logo{
width:100%;height:100%;object-fit:cover;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">
<img src="logo.png" onclick="openLogo()">
</div>

<input id="searchInput" placeholder="Search..." onkeyup="searchProducts()">

<div>
<button onclick="openSignup()">Signup</button>
<button onclick="openLogin()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="openCart()">🛒 <span id="cartCount">0</span></button>
</div>
</div>

<div class="products" id="productList"></div>

<!-- LOGO -->
<div class="modal" id="logoModal">
<div class="logo-wrapper">
<div class="logo-circle">
<img src="logo.png" class="premium-logo">
</div>
<span class="logo-close" onclick="closeAll()">❌</span>
</div>
</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="box">
<span class="close" onclick="closeAll()">❌</span>
<h3>Login</h3>
<input id="luser" placeholder="Username">
<input id="lpass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- SIGNUP -->
<div class="modal" id="signupModal">
<div class="box">
<span class="close" onclick="closeAll()">❌</span>
<h3>Signup</h3>
<input id="suser" placeholder="Username">
<input id="spass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>
</div>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="box">
<span class="close" onclick="closeAll()">❌</span>
<h3>Cart</h3>
<div id="cartItems"></div>
<p>Total ₹<span id="total">0</span></p>
</div>
</div>

<script>

// STORAGE
let users=JSON.parse(localStorage.getItem("users"))||{};
let currentUser=localStorage.getItem("currentUser");

/* 🔥 FULL PRODUCT LIST RESTORED */
let products=[
{name:"Lipstick",price:599,img:"lipstick.png",rating:4},
{name:"Kajal",price:299,img:"kajal.png",rating:5},
{name:"Foundation",price:799,img:"foundation.png",rating:3},
{name:"Compact",price:399,img:"compact.png",rating:4},
{name:"Eyeshadow",price:465,img:"eyeshadow.png",rating:4},
{name:"Eyeliner",price:299,img:"eyeliner.png",rating:5},
{name:"Concealer",price:349,img:"concealer.png",rating:3},
{name:"Nail Polish",price:199,img:"nailpolish.png",rating:4},
{name:"Face Cream",price:499,img:"facecream.png",rating:5},
{name:"Face Wash",price:326,img:"facewash.png",rating:5},
{name:"Face Serum",price:465,img:"faceserum.png",rating:4},
{name:"Moisturizer",price:599,img:"moisturizer.png",rating:4},
{name:"Body Wash",price:699,img:"bodywash.png",rating:3},
{name:"Aloe Vera",price:299,img:"aloevera.png",rating:5},
{name:"Hair Serum",price:549,img:"hairserum.png",rating:4},
{name:"Shampoo",price:399,img:"shampoo.png",rating:4},
{name:"Conditioner",price:449,img:"conditioner.png",rating:3},
{name:"Hair Spray",price:599,img:"hairspray.png",rating:4}
];

// DISPLAY
function showProducts(data){
productList.innerHTML="";
data.forEach(p=>{
productList.innerHTML+=`
<div class="card">
<div class="wishlist" onclick="event.stopPropagation();addWishlist('${p.name}')">❤️</div>
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="stars">${"⭐".repeat(p.rating)}</div>
<p class="price">₹${p.price}</p>
<button onclick="event.stopPropagation();addToCart('${p.name}',${p.price})">Add</button>
</div>`;
});
}
showProducts(products);

// SEARCH
function searchProducts(){
let v=searchInput.value.toLowerCase();
showProducts(products.filter(p=>p.name.toLowerCase().includes(v)));
}

// AUTH
function signup(){
if(users[suser.value]) return alert("User exists");
users[suser.value]={pass:spass.value,cart:[],wishlist:[]};
save();alert("Signup success");closeAll();
}

function login(){
if(users[luser.value] && users[luser.value].pass===lpass.value){
currentUser=luser.value;
localStorage.setItem("currentUser",currentUser);
alert("Login success");
}else alert("Invalid");
closeAll();
}

function logout(){
if(!currentUser){alert("No user logged in");return;}
currentUser=null;
localStorage.removeItem("currentUser");
alert("Logged out");
updateCart();
}

// CART
function addToCart(name,price){
if(!currentUser) return alert("Login required");
users[currentUser].cart.push({name,price});
save();updateCart();
}

function updateCart(){
if(!currentUser){cartCount.innerText=0;return;}
cartCount.innerText=users[currentUser].cart.length;
}

function openCart(){
if(!currentUser) return alert("Login required");

let cart=users[currentUser].cart;
cartItems.innerHTML="";
let total=0;

cart.forEach(c=>{
total+=c.price;
cartItems.innerHTML+=`<p>${c.name} ₹${c.price}</p>`;
});

document.getElementById("total").innerText=total;
cartModal.style.display="flex";
}

// WISHLIST
function addWishlist(name){
if(!currentUser) return alert("Login required");
alert(name+" added ❤️");
}

// LOGO
function openLogo(){
document.getElementById("logoModal").style.display="flex";
}

// SAVE
function save(){
localStorage.setItem("users",JSON.stringify(users));
}

// MODALS
function openLogin(){loginModal.style.display="flex";}
function openSignup(){signupModal.style.display="flex";}
function closeAll(){
document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
}

updateCart();

</script>

</body>
</html>
